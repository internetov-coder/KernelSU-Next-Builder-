name: Build Lavender Kernel (Stormbreaker 4.4) + KernelSU-Next

on:
  workflow_dispatch:
    inputs:
      kernel_source:
        description: '🔗 URL kernel source'
        required: true
        default: 'https://github.com/stormbreaker-project/kernel_xiaomi_lavender'
      kernel_branch:
        description: '🌿 Branch'
        required: true
        default: 'newcam-eas'
      defconfig:
        description: '🧪 Defconfig'
        required: true
        default: 'lavender-perf_defconfig'
      anykernel:
        description: '📦 Use AnyKernel3?'
        required: true
        type: boolean
        default: true
      anykernel_repo:
        description: '🌐 AnyKernel3 repo'
        required: false
        default: 'https://github.com/osm0sis/AnyKernel3.git'
      anykernel_branch:
        description: '🌿 AnyKernel3 branch'
        required: false
        default: 'master'
      zip_name:
        description: '📝 ZIP base name'
        required: false
        default: 'Stormbreaker-Lavender'
      developer:
        description: '👤 Developer name'
        required: false
        default: 'yourname'
      enable_kernelsu_next:
        description: '🔘 Enable KernelSU-Next?'
        required: true
        type: boolean
        default: true

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Jakarta
      OUT_DIR: out

    steps:
      - name: 🧰 Setup Toolchain (fixed)
        run: |
          sudo apt update
          sudo apt install -y gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi
          mkdir clang
          curl -s https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android14-dev/clang-r487747c.tar.gz -LO
          tar -C clang/ -xf clang-r487747c.tar.gz
          rm clang-r487747c.tar.gz

      - name: ⏱️ Pull Kernel Source
        run: |
          git clone --depth=1 ${{ github.event.inputs.kernel_source }} -b ${{ github.event.inputs.kernel_branch }} kernel-source

      - name: 🧙 Inject KernelSU-Next (FIXED)
        if: ${{ github.event.inputs.enable_kernelsu_next }}
        run: |
          cd kernel-source
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s legacy
          cd ..

      - name: ⚙️ Build Kernel (with -Wno-error)
        run: |
          export KBUILD_BUILD_USER="${{ github.event.inputs.developer }}"
          export KBUILD_BUILD_HOST="workspace"
          export PATH=$GITHUB_WORKSPACE/clang/bin:${PATH}
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=/usr/bin/aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=/usr/bin/arm-linux-gnueabi-
          export KBUILD_CFLAGS="-Wno-error"
          args="ARCH=arm64 LLVM=1 LLVM_IAS=1 O=../out"
          cd kernel-source
          make ${args} ${{ github.event.inputs.defconfig }}
          make -j$(nproc) ${args}
          cd ..

      - name: 📦 Package with AnyKernel3
        if: ${{ github.event.inputs.anykernel }}
        run: |
          git clone --depth=1 -b "${{ github.event.inputs.anykernel_branch }}" "${{ github.event.inputs.anykernel_repo }}" AnyKernel3
          rm -rf AnyKernel3/.git* AnyKernel3/LICENSE AnyKernel3/README.md
          IMG_PATH="out/arch/arm64/boot"
          for img in Image.gz-dtb Image-dtb Image.gz Image; do
            if [[ -f $IMG_PATH/$img ]]; then
              cp $IMG_PATH/$img AnyKernel3/$img
              break
            fi
          done
          if [[ -f $IMG_PATH/dtbo.img ]]; then
            cp $IMG_PATH/dtbo.img AnyKernel3/dtbo.img
          fi
          DATE=$(date +'%Y-%m-%d_%H-%M')
          ZIP_NAME="${{ github.event.inputs.zip_name }}-${{ github.event.inputs.developer }}-${DATE}.zip"
          cd AnyKernel3
          zip -r "../${ZIP_NAME}" *
          cd ..

      - name: ☁️ Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-${{ github.event.inputs.developer }}
          path: |
            *.zip
            out/arch/arm64/boot/Image*
            out/arch/arm64/boot/dtbo.img
