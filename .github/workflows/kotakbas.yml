name: Build Lavender Kernel (Stormbreaker 4.4) + KernelSU-Next FINAL

on:
  workflow_dispatch:
    inputs:
      developer:
        description: '👤 Developer name/ID'
        required: false
        default: 'internetov-coder'
      zip_name:
        description: '📝 Output ZIP base name'
        required: false
        default: 'Stormbreaker-Lavender-KSU'
      anykernel:
        description: '📦 Use AnyKernel3 packaging?'
        required: true
        type: boolean
        default: true

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Jakarta
      OUT_DIR: out

    steps:
      - name: 🧰 Setup Toolchain
        run: |
          sudo apt update
          sudo apt install -y gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi
          mkdir clang
          curl -s https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android14-dev/clang-r487747c.tar.gz -LO
          tar -C clang/ -xf clang-r487747c.tar.gz
          rm clang-r487747c.tar.gz

      - name: ⏱️ Pull Kernel Source (with KernelSU-Next)
        run: |
          git clone --depth=1 https://github.com/internetov-coder/kernel_xiaomi_lavender -b newcam-eas-ksu-clean kernel-source
          cd kernel-source
          
          # Распаковываем KernelSU-Next правильно (без symlink)
          rm -rf drivers/kernelsu KernelSU-Next 2>/dev/null || true
          git clone https://github.com/KernelSU-Next/KernelSU-Next.git KernelSU-Next
          cd KernelSU-Next && git checkout legacy && cd ..
          mkdir -p drivers/kernelsu
          cp -r KernelSU-Next/kernel/* drivers/kernelsu/
          cp KernelSU-Next/uapi/* drivers/kernelsu/ 2>/dev/null || true
          
          echo "✅ KernelSU-Next files:"
          ls -la drivers/kernelsu/ | head -10
          cd ..

      - name: ⚙️ Build Kernel
        run: |
          export KBUILD_BUILD_USER="${{ github.event.inputs.developer }}"
          export KBUILD_BUILD_HOST="workspace"
          export PATH=$GITHUB_WORKSPACE/clang/bin:${PATH}
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=/usr/bin/aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=/usr/bin/arm-linux-gnueabi-
          export KCFLAGS="-Wno-error -Wno-format -Wno-stringop-overread"
          args="ARCH=arm64 LLVM=1 LLVM_IAS=1 O=../out"
          cd kernel-source
          make ${args} lavender-perf_defconfig
          make -j$(nproc) ${args}
          cd ..

      - name: 📦 Package with AnyKernel3
        if: ${{ github.event.inputs.anykernel }}
        run: |
          git clone --depth=1 -b master https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          rm -rf AnyKernel3/.git* AnyKernel3/LICENSE AnyKernel3/README.md
          IMG_PATH="out/arch/arm64/boot"
          for img in Image.gz-dtb Image-dtb Image.gz Image; do
            if [[ -f $IMG_PATH/$img ]]; then
              cp $IMG_PATH/$img AnyKernel3/$img
              break
            fi
          done
          if [[ -f $IMG_PATH/dtbo.img ]]; then
            cp $IMG_PATH/dtbo.img AnyKernel3/dtbo.img
          fi
          DATE=$(date +'%Y-%m-%d_%H-%M')
          ZIP_NAME="${{ github.event.inputs.zip_name }}-${{ github.event.inputs.developer }}-${DATE}.zip"
          cd AnyKernel3
          zip -r "../${ZIP_NAME}" *
          cd ..

      - name: ☁️ Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-${{ github.event.inputs.developer }}-KSU
          path: |
            *.zip
            out/arch/arm64/boot/Image*
            out/arch/arm64/boot/dtbo.img
            
